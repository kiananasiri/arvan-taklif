# Frontend Nginx layer for Arvan Cloud Kubernetes.
# The image namespace below assumes you create/use the Docker Hub username
# "kiananasirii". If Docker Hub asks you to pick a different username, replace
# kiananasirii with that username before applying this manifest.
#
# BACKEND_URL is intentionally a placeholder. After backend-service receives an
# EXTERNAL-IP, update this Deployment with:
# kubectl set env deployment/frontend-deployment BACKEND_URL=http://<BACKEND_EXTERNAL_IP>
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: kiananasirii/voting-frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: BACKEND_URL
              value: http://PENDING_BACKEND_EXTERNAL_IP
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  labels:
    app: frontend
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
